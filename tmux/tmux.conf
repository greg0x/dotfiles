# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Extended keys (allows shift+enter, ctrl+shift+*, etc. through tmux)
set -g extended-keys on

# Allow image passthrough (for kitty graphics protocol)
set -g allow-passthrough on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse
set -g mouse on

# Vi mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/dotfiles/scripts/tmux-copy-strip"
bind-key -T copy-mode-vi Y send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "~/dotfiles/scripts/tmux-copy-strip"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Vim-tmux-navigator integration
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Clear pane scrollback
bind l send-keys -R \; clear-history

# Kill pane without confirmation
bind x kill-pane

# Kill session (switches to next, renumbers remaining)
bind X confirm-before -p "Kill session #S? (y/n)" "run-shell '~/dotfiles/scripts/session-kill'"

# Resize panes
bind -r H resize-pane -L 50
bind -r J resize-pane -D 25
bind -r K resize-pane -U 25
bind -r L resize-pane -R 50

# Quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-j previous-window
bind -n M-k next-window
bind -n M-h previous-window
bind -n M-l next-window

# Toggle between last two sessions (Cmd+O via Ghostty)
set -s user-keys[13] "\e[103~"
bind -n User13 switch-client -l

# Cmd+number session switching (via Ghostty custom escape sequences)
set -s user-keys[0] "\e[90~"
set -s user-keys[1] "\e[91~"
set -s user-keys[2] "\e[92~"
set -s user-keys[3] "\e[93~"
set -s user-keys[4] "\e[94~"
set -s user-keys[5] "\e[95~"
set -s user-keys[6] "\e[96~"
set -s user-keys[7] "\e[97~"
set -s user-keys[8] "\e[98~"
set -s user-keys[9] "\e[99~"
bind -n User0 run-shell "~/dotfiles/scripts/session-switch-to 0"
bind -n User1 run-shell "~/dotfiles/scripts/session-switch-to 1"
bind -n User2 run-shell "~/dotfiles/scripts/session-switch-to 2"
bind -n User3 run-shell "~/dotfiles/scripts/session-switch-to 3"
bind -n User4 run-shell "~/dotfiles/scripts/session-switch-to 4"
bind -n User5 run-shell "~/dotfiles/scripts/session-switch-to 5"
bind -n User6 run-shell "~/dotfiles/scripts/session-switch-to 6"
bind -n User7 run-shell "~/dotfiles/scripts/session-switch-to 7"
bind -n User8 run-shell "~/dotfiles/scripts/session-switch-to 8"
bind -n User9 run-shell "~/dotfiles/scripts/session-switch-to 9"

# Lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Open current path in Finder
bind o run-shell 'open "#{pane_current_path}"'

# Sessionizer
bind f display-popup -w 80% -h 60% -E "~/dotfiles/scripts/sessionizer"

# Worktree: create git worktree and open in new session
bind w display-popup -w 60% -h 40% -E "~/dotfiles/scripts/worktree"

# Session picker sorted by name (enables numeric prefix ordering)
bind s choose-tree -sZ -O name

# Reorder sessions (Cmd+< / Cmd+> via Ghostty)
set -s user-keys[14] "\e[104~"
set -s user-keys[15] "\e[105~"
set -s user-keys[16] "\e[106~"
bind -n User14 confirm-before -p "Kill session #S? (y/n)" "run-shell '~/dotfiles/scripts/session-kill'"
bind -n User15 run-shell "~/dotfiles/scripts/session-reorder up"
bind -n User16 run-shell "~/dotfiles/scripts/session-reorder down"

# Next/prev session by name order (Cmd+J/K via Ghostty, Alt+J/K direct)
set -s user-keys[10] "\e[100~"
set -s user-keys[11] "\e[101~"
set -s user-keys[12] "\e[102~"
bind -n User10 run-shell "~/dotfiles/scripts/session-switch next"
bind -n User11 run-shell "~/dotfiles/scripts/session-switch prev"
bind -n User12 run-shell "~/dotfiles/scripts/session-switch prev"
# Cmd+H(F20)/csi:102~ = prev, Cmd+J/L/csi:100~ = next, Cmd+K/csi:101~ = prev

# Session color
bind C display-popup -w 40% -h 50% -E "~/dotfiles/scripts/session-color"

# Apply session color on switch
set-hook -g client-session-changed 'run-shell "~/dotfiles/scripts/session-color-apply"'

# Don't wait for escape sequences
set -sg escape-time 0

# History
set -g history-limit 50000

# Focus events (for vim autoread)
set -g focus-events on

# Status bar - TokyoNight Storm
set -g status-style 'bg=#24283b fg=#c0caf5'
set -g status-left '#[fg=#7aa2f7,bold] #S '
set -g status-right '#[fg=#565f89]#(~/dotfiles/scripts/tmux-git-status #{pane_current_path})| %a %d %b %H:%M '
set -g status-left-length 40
set -g status-right-length 120
set -g status-justify centre
set -g window-status-current-format '#[fg=#c0caf5,bold] #I:#{?window_zoomed_flag,󰊓 ,}[#{P:#{?pane_active,*,}#{s/[0-9]+\.[0-9]+\.[0-9]+/cc/:pane_current_command} }] '
set -g window-status-format '#[fg=#3b4261] #I:[#{P:#{s/[0-9]+\.[0-9]+\.[0-9]+/cc/:pane_current_command} }]#{?window_bell_flag, #[fg=#f7768e]󰂞,#{?window_activity_flag, #[fg=#e0af68]●,}} '
set -g window-status-bell-style 'default'
set -g window-status-activity-style 'default'

# Activity monitoring
set -g monitor-activity on
set -g visual-activity off

# Pane borders - TokyoNight Storm
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

# Active pane background tint
set -g window-active-style bg=#16161e
set -g window-style bg=#24283b

# Nested tmux: F12 toggles outer session off
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style 'bg=#1a1b26 fg=#565f89' \;\
  set status-left '#[fg=#565f89,bold] #S [OFF] ' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u status-left \;\
  refresh-client -S
